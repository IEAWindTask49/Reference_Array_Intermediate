mooring_systems: # CHANGED - updated for intermediate design
  ms0:
    keys: [MooringConfigID, heading, anchorType]
    data:
    - [catenary_config, 0.0, drag-embedment1]
    - [catenary_config, 120.0, drag-embedment1]
    - [catenary_config, 240.0,  drag-embedment1]

mooring_line_configs:
  catenary_config:
    name: catenary mooring line configuration
    span: 979.6 # CHANGED - added overall mooring radius from intermediate array mooring design; update sections
    sections: 
    - connectorType: shackle
    - type: wire_160mm
      length: 280.0
    - connectorType: clump_weight_80
    - type: chain_175mm
      length: 817.0
    - connectorType: shackle

mooring_line_types:
  chain_175mm:
    d_nom:    0.175      # [m] nominal diameter
    d_vol:    0.315      # [m] volume-equivalent diameter
    m:        612.5      # [kg/m] mass per unit length (linear mass density)
    EA:      2621e6      # [N] quasi-static stiffness
    MBL:     22.5e6      # [N] minimum breaking load (fully corroded)
    cost:      4.44      # [$/kg] cost per unit mass
    material: chain      # [-] material composition descriptor
    material_details:  R4 studless  # [-] material composition descriptor
    name: chain_175mm
  wire_160mm: 
    d_nom:    0.160       # [m] nominal diameter
    d_vol:    0.188       # [m] volume-equivalent diameter
    m:        135.5       # [kg/m] mass per unit length (linear mass density)
    EA:       2486e6      # [N] quasi-static stiffness
    MBL:    26.16e6       # [N] minimum breaking load
    cost:      5.39       # [$/kg] cost per unit mass
    material: wire rope   # [-] material composition descriptor
    material_details:  sheathed spiral strand wire  # [-] material composition descriptor
    name: wire_160mm

mooring_connector_types:
  clump_weight_80:
    m: 80000.0          # [kg] mass of clump weight
    type: clump_weight_80
    cost: 0.576         # [$/kg] cost per unit mass
  shackle: # no shackle was designed/selected for this project
    m: 0.0
    v: 0.2 # value copied from deepwater report
    type: shackle
anchor_types:
  drag-embedment1:
    type: dea
    d: 23.5           # Penetration depth of anchor into seabed [m]
    L: 9.70
    m: 40360.0        # mass of anchor [kg]   
    cost: 5.705       # [$/kg] cost per unit mass                         
    
